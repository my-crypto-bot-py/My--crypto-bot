name: Run Advanced Crypto Bot

on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel
          # Yahan hum pandas-ta ko direct source se install kar rahe hain
          pip install git+https://github.com/twopirllc/pandas-ta.git@development
          pip install -r requirements.txt
          
      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
        run: python main.py
